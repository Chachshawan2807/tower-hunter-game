<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" fill="none">
  <rect width="360" height="640" fill="#000"/>
  <!-- void abyss -->
  <ellipse cx="180" cy="400" rx="200" ry="280" fill="url(#void-deep)"/>
  <!-- floating platform -->
  <ellipse cx="180" cy="520" rx="110" ry="18" fill="#1a1a1a" stroke="#c5a059" stroke-width="1.5" opacity="0.8"/>
  <rect x="100" y="480" width="160" height="40" rx="4" fill="#242424" stroke="#996515" stroke-width="1" opacity="0.7"/>
  <!-- gold aura -->
  <ellipse cx="180" cy="360" rx="90" ry="120" fill="url(#void-gold)" opacity="0.6"/>
  <!-- crimson aura -->
  <ellipse cx="180" cy="380" rx="60" ry="80" fill="url(#void-crimson)" opacity="0.5"/>
  <!-- vertical chains fading -->
  <path d="M160 0v200M200 0v180" stroke="#3a3a42" stroke-width="2" opacity="0.12"/>
  <defs>
    <radialGradient id="void-deep" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="70%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="void-gold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c5a059" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="void-crimson" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b22222" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
