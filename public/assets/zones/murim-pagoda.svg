    <radialGradient id="murim-fog" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a100c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
    </radialGradient>
  </defs>
