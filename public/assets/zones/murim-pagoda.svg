<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" fill="none">
  <rect width="360" height="640" fill="#0d0d0d"/>
  <rect x="0" y="0" width="64" height="640" fill="#1a100c"/>
  <rect x="296" y="0" width="64" height="640" fill="#1a100c"/>
  <!-- pagoda roof silhouette -->
  <path d="M180 40 L60 120 L300 120 Z" fill="#2a1810" stroke="#8b0000" stroke-width="1.5" opacity="0.7"/>
  <path d="M180 80 L90 150 L270 150 Z" fill="#1f1410" stroke="#b22222" stroke-width="1" opacity="0.5"/>
  <!-- red pillars -->
  <rect x="52" y="120" width="16" height="520" fill="#2a1810" opacity="0.6"/>
  <rect x="292" y="120" width="16" height="520" fill="#2a1810" opacity="0.6"/>
  <!-- gold accents -->
  <path d="M52 200h16M52 320h16M52 440h16" stroke="#c5a059" stroke-width="2" opacity="0.25"/>
  <path d="M292 240h16M292 360h16M292 480h16" stroke="#c5a059" stroke-width="2" opacity="0.25"/>
  <!-- lantern glow -->
  <ellipse cx="180" cy="200" rx="60" ry="30" fill="url(#murim-glow)"/>
  <ellipse cx="180" cy="560" rx="120" ry="40" fill="url(#murim-fog)"/>
  <defs>
    <radialGradient id="murim-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#daa520" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8b0000" stop-opacity="0"/>
